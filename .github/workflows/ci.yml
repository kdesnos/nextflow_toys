name: Unit tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # Checkout the repository
    - name: Checkout code
      uses: actions/checkout@v3 

    # Set up Python
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13.3'

    # Download required files
    - name: Download required files
      run: bash tests/get_data.sh

    # Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Discover and run tests one by one
    - name: Run tests
      run: |
        # Src project files 
        export PYTHONPATH=src

        # Discover all test files
        test_files=$(find tests -name "test_*.py")
        
        # Track failures
        failed=0
        
        # Run each test file individually
        for test_file in $test_files; do
          echo "Running tests in $test_file..."
          if ! python -m unittest "$test_file" -v; then
            echo "::error::Tests in $test_file failed"
            failed=1
          fi
        done
        
        # Exit with failure if any test failed
        if [ $failed -ne 0 ]; then
          echo "::error::One or more test files failed"
          exit 1
        fi